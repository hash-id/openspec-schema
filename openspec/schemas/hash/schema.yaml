name: hash
version: 1
description: Spec-Driven Development - discovery before proposal, TDD red-green-refactor on apply
artifacts:
  - id: discovery
    generates: discovery.md
    description: Discovery session notes - reasoning and decisions behind the change, produced through a relentless interview
    template: discovery.md
    instruction: >
      Produce discovery.md through a relentless interview - do NOT write it first.


      Interview the user relentlessly until you reach a shared understanding. Walk down each branch of the decision tree, resolving dependencies between decisions one-by-one.

      - Ask ONE question at a time and wait for the answer before continuing. Asking several at once is bewildering.

      - For every question, give your recommended answer first, so the user can confirm or adjust instead of answering from a blank page.

      - If a question can be answered by exploring the codebase or existing specs in `openspec/specs/`, explore it yourself instead of asking.

      - Keep interviewing until the problem, desired outcomes, scope, and key decisions are understood. The problem statement, what changes, capabilities, and impact are written into proposal.md (next phase) - do NOT duplicate them here. discovery.md records ONLY what proposal and design omit: decisions with rationale and rejected alternatives, desired outcomes, assumptions, and open questions.


      Once the interview has converged, write discovery.md from the template. discovery.md is the REASONING log - the why-behind-the-why. The proposal phase reads this file as context and produces the contract (Why / What Changes / Capabilities / Impact); technical decisions and risks go in design.md.
    requires: []
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between

      proposal and specs phases. Research existing specs before filling this in.

      Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -

      implementation details belong in design.md.


      This is the foundation - specs, design, and tasks all build on this.
    requires:
      - discovery
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time.

      If adding new concerns without changing existing behavior, use ADDED
      instead.


      Example:

      ```

      ## ADDED Requirements


      ### Requirement: User can export data

      The system SHALL allow users to export their data in CSV format.


      #### Scenario: Successful export

      - **WHEN** user clicks "Export" button

      - **THEN** system downloads a CSV file with all user data


      ## REMOVED Requirements


      ### Requirement: Legacy export

      **Reason**: Replaced by new export system

      **Migration**: Use new export endpoint at /api/v2/export

      ```


      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      Focus on architecture and approach, not line-by-line implementation.

      Reference the proposal for motivation and specs for requirements.


      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template below exactly.** The apply phase parses

      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Tasks should be small enough to complete in one session

      - Order tasks by dependency (what must be done first?)


      Example:

      ```

      ## 1. Setup


      - [ ] 1.1 Create new module structure

      - [ ] 1.2 Add dependencies to package.json


      ## 2. Core Implementation


      - [ ] 2.1 Implement data export function

      - [ ] 2.2 Add CSV formatting utilities

      ```


      Reference specs for what needs to be built, design for how to build it.

      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design
  - id: align
    generates: align.md
    description: Cross-artifact alignment review - a loop that checks every artifact is consistent with the others and faithful to the requirements, resolving the issues before apply
    template: align.md
    instruction: |
      Verify that every artifact is mutually consistent and faithful to the requirements BEFORE any code is written. Run this as a loop of at most 3 passes, stopping early as soon as a pass finds no HIGH and no MEDIUM issues.

      Each pass:
      1. Re-read all artifacts: discovery.md, proposal.md, specs/**/*.md, design.md, tasks.md. Also run `openspec validate --strict` for deterministic structural checks.
      2. Check consistency across the whole chain:
         - discovery -> proposal: every Key Decision and Desired Outcome is honoured; the proposal never contradicts discovery.
         - proposal -> specs: every New/Modified Capability has a spec file; no spec covers a capability absent from the proposal.
         - proposal <-> design: design stays within proposal scope and introduces no capability the proposal omits.
         - specs <-> design: design explains how each requirement is met and contradicts none of them.
         - specs -> tasks: every requirement and scenario is covered by at least one task; no task is out of scope.
         - spec structure: every requirement has at least one scenario, scenarios use exactly four hashtags (####) with WHEN/THEN, and requirements use SHALL/MUST.
      3. Classify every finding by severity:
         - HIGH: a contradiction between artifacts; a capability with no spec (or a spec with no capability); a requirement with no covering task; a structural error that breaks OpenSpec parsing; a Desired Outcome traceable to nothing.
         - MEDIUM: partial coverage; a vague or untestable requirement; a non-trivial technical choice with no design decision; tasks too coarse or mis-ordered; an edge case implied by discovery but left unscenarioed.
         - LOW: terminology drift, wording, formatting, ordering, or minor omissions.
      4. Tag each finding MECHANICAL or DECISION:
         - MECHANICAL: exactly one correct fix, no scope or intent judgement (e.g. hashtag count, checkbox format, a kebab-case name mismatch, terminology unification, an obvious missing-scenario stub, task reordering).
         - DECISION: more than one valid resolution, or it touches scope or intent (e.g. a capability-vs-spec mismatch, a requirement-vs-task gap, a design-vs-spec contradiction, an uncovered outcome, a vague requirement needing a specific normative choice).
      5. Show this pass's findings grouped under HIGH / MEDIUM / LOW, each tagged MECHANICAL or DECISION.
      6. Resolve them:
         - MECHANICAL findings: fix directly and record what changed.
         - DECISION findings: do NOT edit silently. Surface them to the user ONE at a time, your recommended resolution first (grounded in discovery.md as the source of intent), and apply only what the user confirms or adjusts.
      7. Append this pass to align.md: the findings (severity x mechanical/decision), the mechanical fixes applied, and the decisions the user made.

      Stop when a pass finds no HIGH and no MEDIUM issues, or after the 3rd pass. If any HIGH issue remains unresolved when the loop ends (e.g. the user deferred a decision), STOP - do NOT proceed to apply - and report the remaining HIGH issues to the user. Remaining MEDIUM and LOW issues are logged in align.md as known issues and do not block.
    requires:
      - tasks
apply:
  requires:
    - align
  tracks: tasks.md
  instruction: |
    Two phases: first IMPLEMENT every task with strict TDD, then REVIEW the implementation. Do NOT start the review until every task is [x].

    PHASE 1 - IMPLEMENT (strict TDD, red-green-refactor, ONE task at a time):
    For each pending checkbox task:
    1. RED - derive the ONE behavior it delivers and write a failing unit test for it. Run it; it must fail for the right reason.
    2. GREEN - write the minimal code through the public interface to make it pass. Run the test.
    3. REFACTOR - only while GREEN. Remove duplication, deepen modules, run tests after each change.
    Then tick the checkbox to [x] and move to the next task.
    Rules: one test at a time, only enough code to pass the current test, never refactor while RED, tests must use public interfaces and survive refactors.
    Context files (discovery.md, proposal.md, specs, design.md) are provided - read them as needed. Pause on blockers or when a test keeps failing.

    PHASE 2 - REVIEW (only once every task is [x]):
    Review the implemented code against the specs in a loop of at most 3 passes, stopping early as soon as a pass finds no HIGH and no MEDIUM issues.
    Each pass:
    1. Re-read specs/**/*.md, design.md, tasks.md and the code produced; run the full test suite and any linters.
    2. Check the code against the contract:
       - Every requirement and every #### Scenario in specs is actually implemented AND exercised by a passing test.
       - The code honours the decisions in design.md; no undocumented deviation.
       - Every task is genuinely done, not just checkbox-ticked.
       - No scope drift: nothing built beyond the specs and the proposal.
    3. Classify every finding by severity:
       - HIGH: a requirement or scenario not implemented; a missing or failing test for a scenario; behaviour that contradicts a spec or a design decision; a task ticked but not actually done.
       - MEDIUM: partial implementation; a scenario with weak or indirect test coverage; a design decision only partly honoured; duplication or a leaky interface worth fixing.
       - LOW: naming, comments, formatting, minor cleanups.
    4. Tag each finding MECHANICAL (exactly one correct fix - e.g. a missing assertion, an obvious edge-case test, a rename, formatting) or DECISION (more than one valid resolution, or it touches scope or behaviour - e.g. a requirement implemented differently than specified, a deliberate design deviation, a scenario whose intent is ambiguous).
    5. Display this pass's findings to the user on screen, grouped under HIGH / MEDIUM / LOW, each tagged MECHANICAL or DECISION. Do NOT write a report file - findings are shown on screen only.
    6. Resolve them, staying in red-green-refactor and re-running tests after each change:
       - MECHANICAL findings: fix the code or tests directly.
       - DECISION findings: do NOT change behaviour silently. Surface each to the user ONE at a time, your recommended resolution first (grounded in specs and design.md), and apply only what the user confirms or adjusts.

    Stop when a pass finds no HIGH and no MEDIUM issues, or after the 3rd pass. If any HIGH issue is still unresolved when the loop ends, STOP and mark the change as a RELEASE BLOCKER: report the remaining HIGH issues on screen and tell the user NOT to archive the change until they are resolved. Remaining MEDIUM and LOW issues are shown on screen as known issues.
