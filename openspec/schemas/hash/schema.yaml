name: hash
version: 3
description: Spec-Driven Development that fit againsts Hash SDLC
artifacts:
  - id: discovery
    generates: discovery.md
    description: Discovery session notes - reasoning and decisions behind the change, produced through a relentless interview
    template: discovery.md
    instruction: |
      Produce discovery.md through a relentless interview - do NOT write it first.

      MUST use the `grill-me` skill to run the interview. If a question can be answered by exploring the codebase or existing specs in `openspec/specs/`, explore it yourself instead of asking - prefer, in order: codebase-memory-mcp (if available) > ripgrep (`rg`) > built-in grep/glob tools.

      discovery.md has a scope grill-me doesn't know about: the problem statement, what changes, capabilities, and impact are written into proposal.md (next phase) - do NOT duplicate them here. discovery.md records ONLY what proposal and design omit: decisions with rationale and rejected alternatives, desired outcomes, assumptions, and open questions.

      Do NOT proceed to write discovery.md until the user has explicitly confirmed shared understanding has been reached. Do not infer confirmation from silence or from answering the last question alone.

      Once the interview has converged, write discovery.md from the template. discovery.md is the REASONING log - the why-behind-the-why. The proposal phase reads this file as context and produces the contract (Why / What Changes / Capabilities / Impact); technical decisions and risks go in design.md.
    requires: []

  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between proposal and specs phases.
      Research existing specs before filling this in - prefer, in order: codebase-memory-mcp (if available) > ripgrep (`rg`) > built-in grep/glob tools. Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how", implementation details belong in design.md.
      This is the foundation - specs, design, and tasks all build on this. Because nothing else exists yet to check it against, MUST use the `hrt-adversarial-authoring` skill (artifact: proposal) to draft and adversarially review it before finalizing.
    requires:
      - discovery

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.

      Security requirements (per capability, not per change - a change can add one capability that touches a trust boundary and one that doesn't): check whether the capability touches a trust boundary - new or modified authentication/authorization, external/untrusted input, data exposure or storage, third-party integration, or privilege changes. If it does, SHOULD consider the `security-requirement-extraction` skill's categories when deriving requirements for it, and MUST still write the result as a normal `### Requirement` block above - no second requirement format. If it doesn't touch a trust boundary, the skill MUST NOT be invoked for that capability.

      Once all spec files for this change are drafted, MUST use the `hrt-adversarial-authoring` skill (artifact: specs) to draft and adversarially review them before finalizing - `align`'s checks later verify structure and downstream coverage, not whether a requirement is genuinely the right thing to build.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.

      Security pass (feeds Risks / Trade-offs): MUST check whether the change touches a trust boundary - new or modified authentication/authorization, external/untrusted input, data exposure or storage, third-party integration, or privilege changes. If none apply, MUST skip the security pass and MAY note the skip in one line; fill Risks / Trade-offs from ordinary (non-security) risk if relevant. If any apply, MUST use the `stride-analysis-patterns` skill for threat identification, then MUST use the `threat-mitigation-mapping` skill to map each identified threat to a mitigation, feeding Risks / Trade-offs as [Threat] → Mitigation entries.
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Example:
      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

  - id: align
    generates: align.md
    description: Cross-artifact alignment review - a loop that checks every artifact is consistent with the others and faithful to the requirements, resolving the issues before apply
    template: align.md
    instruction: |
      MUST use the `hrt-align-consistency-review` skill to verify that every artifact is mutually consistent and faithful to the requirements BEFORE any code is written, and to write the findings into align.md.
    requires:
      - tasks

apply:
  requires:
    - align
  tracks: tasks.md
  instruction: |
    Two phases: first IMPLEMENT every task with strict TDD, then REVIEW the implementation. Do NOT start the review until every task is [x].

    PHASE 1 - IMPLEMENT (strict TDD, ONE task at a time):
    MUST use the `tdd` skill for seam confirmation, the RED/GREEN loop, and the anti-patterns to avoid (implementation-coupled tests, tautological tests, horizontal slicing). For each pending checkbox task, follow the skill's loop, then tick the checkbox to [x] and move to the next task.
    Override: unlike the `tdd` skill's default (which defers refactoring to the `code-review` review stage), REFACTOR stays inside this loop as step 3 (only while GREEN, never while RED) - tick the checkbox only after it.
    Context files (discovery.md, proposal.md, specs, design.md) are provided - read them as needed. For any other codebase exploration, prefer, in order: codebase-memory-mcp (if available) > ripgrep (`rg`) > built-in grep/glob tools. Pause on blockers or when a test keeps failing.

    PHASE 2 - REVIEW (only once every task is [x]):
    MUST use the `hrt-apply-code-review` skill to review the implemented code against specs/**/*.md, design.md, and tasks.md, resolving findings before the change is considered done.
